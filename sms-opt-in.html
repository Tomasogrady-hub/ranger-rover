<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Consent — Enrich LA Ranger Rover</title>
<style>
  :root{--sage:#3a5a3a;--fog:#f4f4f1;--ink:#2b2b2b;--line:#dcdcdc}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       max-width:480px;margin:0 auto;padding:28px 20px 60px;color:var(--ink);background:#fff;line-height:1.5}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:#666;font-size:13px;margin-bottom:22px}
  .banner{background:#fff8e6;border:1px solid #f0d98a;border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:20px}
  .card{border:1px solid var(--line);border-radius:10px;padding:16px 18px;background:var(--fog);margin-bottom:18px}
  .name{font-size:15px;font-weight:600;margin-bottom:14px}
  .consent-row{display:flex;align-items:flex-start;gap:10px}
  .consent-row input[type=checkbox]{margin-top:3px;width:19px;height:19px;flex-shrink:0}
  .consent-row label{font-size:14px;line-height:1.55;cursor:pointer}
  .links{margin-top:10px;font-size:13px}
  .links a{color:var(--sage)}
  button{width:100%;padding:13px;border:none;border-radius:8px;background:var(--sage);color:#fff;
         font-size:15px;font-weight:600;margin-top:18px;cursor:pointer}
  button:disabled{background:#aaa;cursor:not-allowed}
  .status{font-size:13px;color:#666;margin-top:10px;text-align:center}
  .confirm{text-align:center;padding:30px 10px}
  .confirm .check{font-size:40px;margin-bottom:10px}
  .return-link{display:inline-block;margin-top:18px;color:var(--sage);font-weight:600;text-decoration:none}
  .error{color:#a33;font-size:13px;margin-top:10px}
</style>
</head>
<body>

  <h1>SMS Consent</h1>
  <div class="sub">Enrich LA · Garden Rangers Program · Ranger Rover</div>

  <div id="app">Loading…</div>

<script>
(function(){
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbzdqoCSOkvDYuEdMzZsEafBVegdCgEudbxPdqLXlH3DcHLHzUZHBLC-vPlhQ1oqfnYd/exec';
  var params = new URLSearchParams(window.location.search);
  var email = params.get('email') || '';
  var token = params.get('token') || '';
  var app = document.getElementById('app');

  var CONSENT_TEXT = 'I consent to receive SMS text messages from Enrich LA about site updates, chores, and program communications. Message frequency varies. Msg &amp; data rates may apply. Reply STOP to opt out, HELP for help.';
  var LINKS_HTML = '<div class="links"><a href="https://www.enrichla.org/enrichla-privacy-policy" target="_blank" rel="noopener">Privacy Policy</a> &nbsp;·&nbsp; <a href="https://www.enrichla.org/enrich-la-sms-terms-and-conditions" target="_blank" rel="noopener">SMS Terms &amp; Conditions</a></div>';

  function post(action, extra){
    var body = Object.assign({action:action}, extra || {});
    return fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body)})
      .then(function(r){ return r.json(); });
  }

  function renderPreview(){
    app.innerHTML =
      '<div class="banner">This is a preview of the Ranger Rover SMS consent screen. To actually opt in or out, open this link from your My Profile screen in the Ranger Rover app, which includes your personal secure link.</div>' +
      '<div class="card">' +
        '<div class="name">Garden Ranger</div>' +
        '<div class="consent-row"><input type="checkbox" disabled><label>' + CONSENT_TEXT + '</label></div>' +
        LINKS_HTML +
      '</div>' +
      '<button disabled>SAVE</button>';
  }

  function renderError(msg){
    app.innerHTML =
      '<div class="banner">' + msg + ' Please open this link again from your My Profile screen in the Ranger Rover app.</div>' +
      '<div class="card">' +
        '<div class="consent-row"><input type="checkbox" disabled><label>' + CONSENT_TEXT + '</label></div>' +
        LINKS_HTML +
      '</div>';
  }

  function renderForm(name, consent){
    app.innerHTML =
      '<div class="card">' +
        '<div class="name">' + name + '</div>' +
        '<div class="consent-row"><input type="checkbox" id="c" ' + (consent ? 'checked' : '') + '><label for="c">' + CONSENT_TEXT + '</label></div>' +
        LINKS_HTML +
      '</div>' +
      '<button id="save">SAVE</button>' +
      '<div class="status" id="status"></div>';
    document.getElementById('save').addEventListener('click', function(){
      var btn = this;
      btn.disabled = true;
      var statusEl = document.getElementById('status');
      statusEl.textContent = 'Saving…';
      var checked = document.getElementById('c').checked;
      post('publicSmsOptIn', {email: email, token: token, consent: checked})
        .then(function(res){
          if (res && res.ok) {
            renderConfirm(res.name || name, res.consent);
          } else {
            statusEl.innerHTML = '<span class="error">' + (res && res.error ? res.error : 'Something went wrong. Please try again.') + '</span>';
            btn.disabled = false;
          }
        })
        .catch(function(){
          statusEl.innerHTML = '<span class="error">Network error. Please try again.</span>';
          btn.disabled = false;
        });
    });
  }

  function renderConfirm(name, consent){
    app.innerHTML =
      '<div class="confirm">' +
        '<div class="check">' + (consent ? '&#9989;' : '&#128276;') + '</div>' +
        '<div style="font-size:16px;font-weight:600">' + (consent ? 'You\'re opted in' : 'You\'ve been opted out') + '</div>' +
        '<div style="color:#666;font-size:14px;margin-top:6px">' + name + ', your SMS preference has been saved.</div>' +
        '<a class="return-link" href="https://tomasogrady-hub.github.io/ranger-rover/">&larr; Return to Ranger Rover</a>' +
      '</div>';
  }

  if (!email || !token) {
    renderPreview();
  } else {
    post('publicSmsOptInStatus', {email: email, token: token})
      .then(function(res){
        if (res && res.ok) {
          renderForm(res.name || 'Garden Ranger', res.consent);
        } else {
          renderError(res && res.error ? res.error : 'This link is invalid or has expired.');
        }
      })
      .catch(function(){
        renderError('Could not load your consent status.');
      });
  }
})();
</script>

</body>
</html>
